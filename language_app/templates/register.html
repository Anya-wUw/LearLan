{% extends "base.html" %}
{% block title %}Register — LearLan{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="text-center mb-4 fw-bold">🌐 LearLan</h2>
        <h5 class="text-center text-muted mb-4">Create an account</h5>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Username <span class="text-danger">*</span></label>
            <input type="text" name="username" class="form-control" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label">Email <span class="text-muted small">(optional)</span></label>
            <input type="email" name="email" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Password <span class="text-danger">*</span></label>
            <input type="password" name="password" class="form-control" required />
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
            <input type="password" name="confirm_password" class="form-control" required />
          </div>
          <button type="submit" class="btn btn-primary w-100">Create Account</button>
        </form>
        <hr />
        <p class="text-center text-muted mb-0">
          Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
